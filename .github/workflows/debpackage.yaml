name: Build Debian package

on:
  push:
    branches:
      - debian
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:

      - name: Install Debian packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dpkg-dev debbootstrap devscripts equivs
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install build dependencies
        run: |
          sudo mk-build-deps -i -r -t 'apt-get -y'
      - name: Create upstream tarball
        run: |
          VERSION=0.1.0
          tar -czf ../liballocs_${VERSION}.orig.tar.gz .
      - name: Build Debian package
        run: dpkg-buildpackage -us -uc
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-source-package
          path: |
            ../*.dsc
            ../*.debian.tar.*
            ../*.orig.tar.*
          retention-days: 7